user www-data;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    
    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    
    # Configuration HTTPS
    server {
        listen 443 ssl;
        server_name kipouliq.42.fr;
        
        # SSL
        ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
        
        # Document root - doit être partagé avec le container PHP-FPM
        root /var/www/html;
        index index.php index.html;
        
        # Sécurité WordPress
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }
        
        location = /robots.txt {
            allow all;
            log_not_found off;
            access_log off;
        }
        
        # Bloquer l'accès aux fichiers sensibles
        location ~* /(?:uploads|files)/.*\.php$ {
            deny all;
        }
        
        location ~* ^/(wp-config\.php|wp-admin/setup-config\.php) {
            deny all;
        }
        
        # Gestion des fichiers statiques
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1M;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
        
        # Configuration principale WordPress
        location / {
            try_files $uri $uri/ /index.php?$args;
        }
        
        # Traitement PHP
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            
            include fastcgi_params;
            fastcgi_pass wordpress-php:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            
            # Sécurité et performance
            fastcgi_connect_timeout 60;
            fastcgi_send_timeout 180;
            fastcgi_read_timeout 180;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_temp_file_write_size 256k;
        }
        
        # Bloquer l'accès aux fichiers cachés
        location ~ /\. {
            deny all;
        }
    }
}
